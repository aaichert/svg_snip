name: Build and Publish to PyPI

on:
  push:
    branches: [ main ]
    tags:
      - "v*"

  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]

    steps:
    - uses: actions/checkout@v5
      with:
        fetch-depth: 0  # Fetch full history for setuptools-scm

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build pytest
        pip install -e .

    - name: Test package installation
      run: |
        python -c "import svg_snip; print('Package imported successfully')"
        python -c "from svg_snip.Composer import Composer; print('Composer imported successfully')"
        python -c "from svg_snip.Elements import circle; print('Elements imported successfully')"

    - name: Build package
      run: python -m build

    - name: Check distribution
      run: |
        pip install twine
        twine check dist/*

  publish:
    needs: test
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    environment:
      name: pypi
      url: https://pypi.org/p/svg-snip
    permissions:
      id-token: write  # IMPORTANT: this permission is mandatory for trusted publishing

    steps:
    - uses: actions/checkout@v5
      with:
        fetch-depth: 0  # Fetch full history for setuptools-scm

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install build dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build

    - name: Debug SCM
      run: |
        python -m setuptools_scm
        git describe --tags
        git tag --points-at HEAD

    - name: Build package
      run: python -m build

    - name: Publish package distributions to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1